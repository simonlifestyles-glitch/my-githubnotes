<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout — my-notes</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --border: rgba(255,255,255,0.07);
  --text: #e2e8f0;
  --muted: #64748b;
  --accent: #f59e0b;
  --blue: #3b82f6;
  --teal: #14b8a6;
  --pink: #ec4899;
  --purple: #8b5cf6;
  --green: #22c55e;
  --red: #ef4444;
}
 
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow: hidden;
}
 
/* Stars background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 15%, rgba(255,255,255,0.25) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}
 
.game-wrap {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
  max-width: 520px;
}
 
/* Header */
.game-header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.game-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
}
.back-link {
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
  transition: color 0.2s, border-color 0.2s;
}
.back-link:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
 
/* Stats bar */
.stats-bar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 20px;
}
.stat { text-align: center; }
.stat-label { font-size: 9px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
.stat-value { font-size: 18px; font-weight: 700; color: var(--text); }
.stat-value.score-val { color: var(--accent); }
.stat-value.lives-val { color: var(--pink); }
.stat-value.level-val { color: var(--teal); }
 
/* Canvas */
canvas {
  border: 1px solid var(--border);
  border-radius: 12px;
  display: block;
  background: var(--bg2);
  box-shadow: 0 0 40px rgba(59,130,246,0.08), 0 0 80px rgba(139,92,246,0.05);
}
 
/* Controls */
.controls {
  display: flex;
  gap: 8px;
  width: 100%;
}
.btn {
  flex: 1;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg2);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
  text-transform: uppercase;
}
.btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }
.btn.primary { border-color: rgba(245,158,11,0.4); color: var(--accent); }
.btn.primary:hover { background: rgba(245,158,11,0.08); border-color: var(--accent); }
 
/* Hint */
.hint {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-align: center;
}
 
/* Overlay */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: rgba(10,14,26,0.88);
  border-radius: 12px;
  backdrop-filter: blur(4px);
  z-index: 10;
}
.overlay h2 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.overlay p { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.7; }
.overlay .big-score { font-size: 40px; font-weight: 700; color: var(--accent); }
.overlay .start-btn {
  margin-top: 8px;
  padding: 12px 32px;
  background: rgba(245,158,11,0.12);
  border: 1px solid rgba(245,158,11,0.4);
  border-radius: 8px;
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.overlay .start-btn:hover { background: rgba(245,158,11,0.2); border-color: var(--accent); }
 
.canvas-wrap { position: relative; width: 100%; }
</style>
</head>
<body>
 
<div class="game-wrap">
  <div class="game-header">
    <span class="game-title">⬡ Breakout</span>
    <a href="index.html" class="back-link">← 回筆記</a>
  </div>
 
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-value score-val" id="score-display">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="best-display">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Level</div>
      <div class="stat-value level-val" id="level-display">1</div>
    </div>
    <div class="stat">
      <div class="stat-label">Lives</div>
      <div class="stat-value lives-val" id="lives-display">♥ ♥ ♥</div>
    </div>
  </div>
 
  <div class="canvas-wrap">
    <canvas id="canvas" width="480" height="360"></canvas>
    <div class="overlay" id="overlay">
      <h2 style="color: var(--accent)">Breakout</h2>
      <p>用滑鼠或方向鍵控制擋板<br>打破所有磚塊過關</p>
      <button class="start-btn" onclick="startGame()">▶ 開始遊戲</button>
    </div>
  </div>
 
  <div class="controls">
    <button class="btn primary" onclick="startGame()">↺ 重新開始</button>
    <button class="btn" onclick="togglePause()">⏸ 暫停</button>
  </div>
  <p class="hint">滑鼠移動 或 ← → 方向鍵控制擋板</p>
</div>
 
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
 
// Game state
let score = 0, best = 0, level = 1, lives = 3;
let gameRunning = false, paused = false, animId = null;
 
// Paddle
const PAD_H = 10, PAD_SPEED = 6;
let pad = { x: W/2 - 40, y: H - 30, w: 80 };
let padTarget = pad.x;
 
// Ball
let ball = { x: 0, y: 0, vx: 0, vy: 0, r: 7 };
 
// Bricks
const BRICK_ROWS = 5, BRICK_COLS = 10;
const BRICK_W = 42, BRICK_H = 14, BRICK_GAP = 3;
const BRICK_OFF_X = (W - (BRICK_COLS * (BRICK_W + BRICK_GAP) - BRICK_GAP)) / 2;
const BRICK_OFF_Y = 40;
let bricks = [];
 
const BRICK_COLORS = [
  { fill: '#ef4444', glow: 'rgba(239,68,68,0.4)', pts: 50 },
  { fill: '#f97316', glow: 'rgba(249,115,22,0.4)', pts: 40 },
  { fill: '#eab308', glow: 'rgba(234,179,8,0.4)',  pts: 30 },
  { fill: '#22c55e', glow: 'rgba(34,197,94,0.4)',  pts: 20 },
  { fill: '#3b82f6', glow: 'rgba(59,130,246,0.4)', pts: 10 },
];
 
// Particles
let particles = [];
 
function initBricks() {
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      bricks.push({
        x: BRICK_OFF_X + c * (BRICK_W + BRICK_GAP),
        y: BRICK_OFF_Y + r * (BRICK_H + BRICK_GAP),
        w: BRICK_W, h: BRICK_H,
        alive: true,
        color: BRICK_COLORS[r],
        hp: r < 2 ? 2 : 1,
      });
    }
  }
}
 
function resetBall() {
  ball.x = pad.x + pad.w / 2;
  ball.y = pad.y - ball.r - 2;
  const angle = -Math.PI/2 + (Math.random() - 0.5) * 0.8;
  const speed = 4 + level * 0.5;
  ball.vx = Math.cos(angle) * speed;
  ball.vy = Math.sin(angle) * speed;
}
 
function startGame() {
  document.getElementById('overlay').style.display = 'none';
  score = 0; level = 1; lives = 3;
  pad.w = 80;
  pad.x = W/2 - pad.w/2;
  particles = [];
  initBricks();
  resetBall();
  updateHUD();
  gameRunning = true;
  paused = false;
  if (animId) cancelAnimationFrame(animId);
  loop();
}
 
function togglePause() {
  if (!gameRunning) return;
  paused = !paused;
  if (!paused) loop();
}
 
function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.04 + Math.random() * 0.04,
      r: 2 + Math.random() * 3,
      color,
    });
  }
}
 
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
  }
}
 
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}
 
function drawBackground() {
  ctx.fillStyle = '#111827';
  ctx.fillRect(0, 0, W, H);
  // subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}
 
function drawPaddle() {
  // Glow
  ctx.shadowColor = '#f59e0b';
  ctx.shadowBlur = 16;
  // Gradient fill
  const grad = ctx.createLinearGradient(pad.x, pad.y, pad.x + pad.w, pad.y + PAD_H);
  grad.addColorStop(0, '#fbbf24');
  grad.addColorStop(0.5, '#f59e0b');
  grad.addColorStop(1, '#d97706');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(pad.x, pad.y, pad.w, PAD_H, 5);
  ctx.fill();
  ctx.shadowBlur = 0;
}
 
function drawBall() {
  // Trail
  ctx.shadowColor = '#60a5fa';
  ctx.shadowBlur = 20;
  const grad = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.r);
  grad.addColorStop(0, '#93c5fd');
  grad.addColorStop(1, '#2563eb');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}
 
function drawBricks() {
  for (const b of bricks) {
    if (!b.alive) continue;
    // Glow
    ctx.shadowColor = b.color.glow;
    ctx.shadowBlur = b.hp > 1 ? 12 : 6;
    // Fill
    ctx.fillStyle = b.hp > 1
      ? b.color.fill
      : b.color.fill + 'aa';
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 3);
    ctx.fill();
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.roundRect(b.x + 2, b.y + 2, b.w - 4, 4, 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}
 
function update() {
  // Paddle smoothing (keyboard)
  pad.x += (padTarget - pad.x) * 0.2;
  pad.x = Math.max(0, Math.min(W - pad.w, pad.x));
 
  // Ball move
  ball.x += ball.vx;
  ball.y += ball.vy;
 
  // Wall bounce
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }
 
  // Paddle collision
  if (
    ball.vy > 0 &&
    ball.x > pad.x && ball.x < pad.x + pad.w &&
    ball.y + ball.r > pad.y && ball.y + ball.r < pad.y + PAD_H + ball.r
  ) {
    ball.y = pad.y - ball.r;
    const hit = (ball.x - (pad.x + pad.w / 2)) / (pad.w / 2);
    const angle = hit * 1.1;
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    ball.vx = Math.sin(angle) * speed;
    ball.vy = -Math.abs(Math.cos(angle) * speed);
    spawnParticles(ball.x, ball.y + ball.r, '#fbbf24');
  }
 
  // Ball lost
  if (ball.y - ball.r > H) {
    lives--;
    updateHUD();
    if (lives <= 0) { gameOver(); return; }
    resetBall();
  }
 
  // Brick collision
  for (const b of bricks) {
    if (!b.alive) continue;
    if (
      ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
      ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h
    ) {
      b.hp--;
      if (b.hp <= 0) {
        b.alive = false;
        spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color.fill);
        score += b.color.pts;
      } else {
        spawnParticles(b.x + b.w/2, b.y + b.h/2, '#ffffff');
        score += Math.floor(b.color.pts / 2);
      }
      // Reflect
      const overlapTop = ball.y + ball.r - b.y;
      const overlapBottom = b.y + b.h - (ball.y - ball.r);
      const overlapLeft = ball.x + ball.r - b.x;
      const overlapRight = b.x + b.w - (ball.x - ball.r);
      const minV = Math.min(overlapTop, overlapBottom);
      const minH = Math.min(overlapLeft, overlapRight);
      if (minV < minH) ball.vy *= -1; else ball.vx *= -1;
      updateHUD();
      break;
    }
  }
 
  // Check level clear
  if (bricks.every(b => !b.alive)) {
    level++;
    pad.w = Math.max(44, pad.w - 6);
    initBricks();
    resetBall();
    updateHUD();
  }
 
  updateParticles();
}
 
function draw() {
  drawBackground();
  drawParticles();
  drawBricks();
  drawPaddle();
  drawBall();
 
  // Paused overlay
  if (paused) {
    ctx.fillStyle = 'rgba(10,14,26,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e2e8f0';
    ctx.font = 'bold 24px "Space Mono"';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.font = '13px "Space Mono"';
    ctx.fillStyle = '#64748b';
    ctx.fillText('按「暫停」繼續', W/2, H/2 + 30);
    ctx.textAlign = 'left';
  }
}
 
function loop() {
  if (!gameRunning || paused) return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}
 
function gameOver() {
  gameRunning = false;
  if (score > best) best = score;
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `
    <h2 style="color:var(--pink)">GAME OVER</h2>
    <div class="big-score">${score}</div>
    <p>最高紀錄：${best} 分<br>抵達第 ${level} 關</p>
    <button class="start-btn" onclick="startGame()">↺ 再玩一次</button>
  `;
  updateHUD();
}
 
function updateHUD() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('best-display').textContent = best;
  document.getElementById('level-display').textContent = level;
  const hearts = ['♥ ♥ ♥', '♥ ♥ ♡', '♥ ♡ ♡', '♡ ♡ ♡'];
  document.getElementById('lives-display').textContent = hearts[Math.max(0, 3 - lives)];
}
 
// Mouse control
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  padTarget = mx - pad.w / 2;
});
 
// Touch control
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const tx = e.touches[0].clientX - rect.left;
  padTarget = tx - pad.w / 2;
}, { passive: false });
 
// Keyboard control
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') togglePause();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
 
setInterval(() => {
  if (!gameRunning || paused) return;
  if (keys['ArrowLeft'])  padTarget -= PAD_SPEED * 3;
  if (keys['ArrowRight']) padTarget += PAD_SPEED * 3;
}, 16);
 
// Draw initial screen
drawBackground();
</script>
</body>
</html>
